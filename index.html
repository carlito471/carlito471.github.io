<!DOCTYPE html>
<html>
<head>
  <title>Daftar Repositori GitHub</title>
</head>
<body>

  <h1>Daftar Repositori GitHub Saya</h1>
  <ul id="repo-list"></ul>

  <script>
    const username = 'carlito471'; // Ganti dengan username GitHub Anda
    const apiUrl = `https://api.github.com/users/${carlito471}/repos`;

    fetch(apiUrl)
      .then(response => response.json())
      .then(repos => {
        const repoList = document.getElementById('repo-list');
        repos.forEach(repo => {
          const listItem = document.createElement('li');
          const link = document.createElement('a');
          link.href = repo.html_url;
          link.textContent = repo.name;
          listItem.appendChild(link);
          repoList.appendChild(listItem);
        });
      })
      .catch(error => {
        console.error('Error fetching data:', error);
        const repoList = document.getElementById('repo-list');
        const listItem = document.createElement('li');
        listItem.textContent = 'Gagal memuat repositori. Periksa konsol untuk detail lebih lanjut.';
        repoList.appendChild(listItem);
      });
  </script>

</body>
</html>
